name: Release

on:
  push:
    branches: [main]
    paths:
      - manifest.json

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package.json and manifest.json versions match
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          MANIFEST_VERSION=$(jq -r .version manifest.json)
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION, manifest.json=$MANIFEST_VERSION"
            exit 1
          fi

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip if already released
        if: steps.check.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already exists, skipping." && exit 0

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - if: steps.check.outputs.exists == 'false'
        run: npm ci

      - if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Pack MCPB bundle
        if: steps.check.outputs.exists == 'false'
        run: |
          npm install -g @anthropic-ai/mcpb
          mcpb pack . kaito-mcp-server.mcpb

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.exists == 'false'
        run: |
          jq '.name = "@metasearch-io/kaito-mcp-server"' package.json > package.tmp && mv package.tmp package.json
          npm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          npm publish --access public --registry https://npm.pkg.github.com
          git checkout package.json
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Create tag and GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" kaito-mcp-server.mcpb --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
